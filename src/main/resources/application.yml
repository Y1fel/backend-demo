server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: backend-demo

  datasource:
    driver-class-name:
    url:
    username:
    password:

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.y1fel.backend
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
